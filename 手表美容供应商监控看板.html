<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手表美容 · 供应商维修监控看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 24px 32px; }
.header h1 { font-size: 24px; font-weight: 600; }
.header .sub { opacity: .7; font-size: 14px; margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.section-title { font-size: 18px; font-weight: 600; color: #1a1a2e; margin: 28px 0 16px; padding-left: 12px; border-left: 4px solid #4361ee; }
.section-title:first-of-type { margin-top: 0; }
.grid { display: grid; gap: 16px; margin-bottom: 24px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card h3 { font-size: 14px; color: #666; margin-bottom: 12px; font-weight: 500; }
.chart-box { width: 100%; height: 320px; }
.chart-box-tall { width: 100%; height: 360px; }
.stats-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
.stats-day { text-align: center; padding: 8px; border-radius: 8px; background: #f8f9fa; }
.stats-day .date { font-size: 11px; color: #999; }
.stats-day .num { font-size: 18px; font-weight: 700; color: #4361ee; margin-top: 2px; }
.stats-day .pct { font-size: 12px; color: #666; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
@media (max-width: 900px) {
  .grid-2 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <h1>⌚ 手表美容 · 供应商维修监控看板</h1>
  <div class="sub">统计周期：2026-05-06 至 2026-05-15 | 数据来源：维修工单系统 | 更新于 2026-05-18</div>
</div>

<div class="container">

<!-- ============ 一、全局汇总 ============ -->
<div class="section-title">一、全局汇总（不区分供应商）</div>

<div class="grid grid-2">
  <div class="card">
    <h3>📥 每日流入量</h3>
    <div class="stats-grid" id="global-inflow-stats"></div>
    <div class="chart-box" id="chart-global-inflow"></div>
  </div>
  <div class="card">
    <h3>✅ 每日初检通过率</h3>
    <div class="stats-grid" id="global-inspect-stats"></div>
    <div class="chart-box" id="chart-global-inspect"></div>
  </div>
</div>

<!-- ============ 二、分供应商 ============ -->
<div class="section-title">二、分供应商详情</div>

<div class="card" style="margin-bottom: 16px;">
  <h3>📥 供应商 · 每日流入量</h3>
  <div class="legend" id="inflow-legend"></div>
  <div class="chart-box-tall" id="chart-sup-inflow"></div>
</div>

<div class="card" style="margin-bottom: 16px;">
  <h3>✅ 供应商 · 每日初检通过率</h3>
  <div class="legend" id="inspect-legend"></div>
  <div class="chart-box-tall" id="chart-sup-inspect"></div>
</div>

<!-- 明细表格 -->
<div class="card">
  <h3>📋 数据明细</h3>
  <div style="overflow-x:auto">
    <table id="detail-table" style="width:100%;border-collapse:collapse;font-size:13px"></table>
  </div>
</div>

</div>

<script>
// ========== 真实数据 ==========
const data = {
  "dates": ["2026-05-06","2026-05-07","2026-05-08","2026-05-09","2026-05-11","2026-05-12","2026-05-13","2026-05-14","2026-05-15"],
  "global_inflow": [35,65,86,74,59,68,90,86,74],
  "global_inspect_rate": [25.7,32.3,19.8,12.2,44.1,3.0,80.0,93.0,59.7],
  "global_inspect_pass": [9,21,17,9,26,2,72,80,43],
  "global_inspect_total": [35,65,86,74,59,67,90,86,72],
  "sup_names": ["花变靓","众联昌","焕靓机","内部"],
  "sup_inflow": {
    "花变靓": [0,0,0,0,33,29,46,45,37],
    "众联昌": [35,0,0,0,0,38,44,41,0],
    "焕靓机": [0,0,22,0,0,0,0,0,35],
    "内部": [0,65,64,74,26,1,0,0,2]
  },
  "sup_inspect_rate": {
    "花变靓": [0,0,0,0,3.0,6.9,84.8,93.3,94.6],
    "众联昌": [25.7,0,0,0,0,0,75.0,92.7,0],
    "焕靓机": [0,0,0,0,0,0,0,0,22.9],
    "内部": [0,32.3,26.6,12.2,96.2,0,0,0,0]
  }
};

const colors = { '花变靓': '#4361ee', '众联昌': '#f72585', '焕靓机': '#4cc9f0', '内部': '#6c757d' };
const supNames = data.sup_names;

// ========== 全局每日流入量 ==========
function renderGlobalInflow() {
  const container = document.getElementById('global-inflow-stats');
  const max = Math.max(...data.global_inflow);
  data.dates.forEach((d, i) => {
    const v = data.global_inflow[i];
    const pct = max > 0 ? Math.round(v/max*100) : 0;
    container.innerHTML += '<div class="stats-day"><div class="date">' + d.slice(5) + '</div><div class="num">' + v + '</div><div style="height:4px;background:#e9ecef;border-radius:2px;margin-top:4px"><div style="height:100%;width:' + pct + '%;background:#4361ee;border-radius:2px"></div></div></div>';
  });
}
renderGlobalInflow();

// ========== 全局初检通过率 ==========
function renderGlobalInspect() {
  const container = document.getElementById('global-inspect-stats');
  data.dates.forEach((d, i) => {
    const rate = data.global_inspect_rate[i];
    const pass = data.global_inspect_pass[i];
    const total = data.global_inspect_total[i];
    const color = rate >= 50 ? '#2ec4b6' : rate >= 20 ? '#ff9f1c' : '#e63946';
    container.innerHTML += '<div class="stats-day"><div class="date">' + d.slice(5) + '</div><div class="num" style="color:' + color + '">' + rate + '%</div><div style="font-size:11px;color:#999">' + pass + '/' + total + '</div></div>';
  });
}
renderGlobalInspect();

// ========== 图例 ==========
function makeLegend(containerId) {
  const el = document.getElementById(containerId);
  supNames.forEach(s => {
    el.innerHTML += '<div class="legend-item"><span class="legend-dot" style="background:' + colors[s] + '"></span>' + s + '</div>';
  });
}

// 1. 全局流入量
function chartGlobalInflow() {
  const chart = echarts.init(document.getElementById('chart-global-inflow'));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: 50, right: 20, top: 20, bottom: 30 },
    xAxis: { type: 'category', data: data.dates.map(function(d){return d.slice(5);}), axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', minInterval: 1 },
    series: [{
      type: 'bar',
      data: data.global_inflow,
      itemStyle: { color: '#4361ee', borderRadius: [4,4,0,0] },
      label: { show: true, position: 'top', fontSize: 11 }
    }]
  });
  window.addEventListener('resize', function(){chart.resize();});
}

// 2. 全局初检通过率
function chartGlobalInspect() {
  const chart = echarts.init(document.getElementById('chart-global-inspect'));
  chart.setOption({
    tooltip: { trigger: 'axis', formatter: function(p) {
      var i = p[0].dataIndex;
      return data.dates[i] + '<br/>通过率: ' + data.global_inspect_rate[i] + '%<br/>(通过: ' + data.global_inspect_pass[i] + ' / 总数: ' + data.global_inspect_total[i] + ')';
    }},
    grid: { left: 50, right: 20, top: 20, bottom: 30 },
    xAxis: { type: 'category', data: data.dates.map(function(d){return d.slice(5);}), axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
    series: [{
      type: 'bar',
      data: data.global_inspect_rate,
      itemStyle: { color: function(p) { var v = p.value; return v >= 50 ? '#2ec4b6' : v >= 20 ? '#ff9f1c' : '#e63946'; }, borderRadius: [4,4,0,0] },
      label: { show: true, position: 'top', formatter: '{c}%', fontSize: 11 }
    }]
  });
  window.addEventListener('resize', function(){chart.resize();});
}

// 3. 分供应商流入量
function chartSupInflow() {
  makeLegend('inflow-legend');
  var chart = echarts.init(document.getElementById('chart-sup-inflow'));
  var series = supNames.map(function(s) {
    return {
      name: s,
      type: 'bar',
      stack: 'total',
      data: data.sup_inflow[s],
      itemStyle: { color: colors[s], borderRadius: 0 },
      label: { show: false }
    };
  });
  chart.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    legend: { data: supNames, bottom: 0 },
    grid: { left: 50, right: 20, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: data.dates.map(function(d){return d.slice(5);}), axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', minInterval: 1 },
    series: series
  });
  window.addEventListener('resize', function(){chart.resize();});
}

// 4. 分供应商初检通过率
function chartSupInspect() {
  makeLegend('inspect-legend');
  var chart = echarts.init(document.getElementById('chart-sup-inspect'));
  var series = supNames.map(function(s) {
    return {
      name: s,
      type: 'line',
      data: data.sup_inspect_rate[s].map(function(v){return v > 0 ? v : null;}),
      smooth: true,
      symbol: 'circle',
      symbolSize: 8,
      lineStyle: { width: 3 },
      itemStyle: { color: colors[s] },
      connectNulls: false,
      label: { show: true, formatter: '{c}%', fontSize: 10 }
    };
  });
  chart.setOption({
    tooltip: { trigger: 'axis' },
    legend: { data: supNames, bottom: 0 },
    grid: { left: 50, right: 20, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: data.dates.map(function(d){return d.slice(5);}), axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
    series: series
  });
  window.addEventListener('resize', function(){chart.resize();});
}

// ========== 明细表格 ==========
function renderTable() {
  var table = document.getElementById('detail-table');
  var html = '<thead><tr style="background:#f8f9fa;font-weight:600">';
  html += '<th style="padding:8px;border:1px solid #dee2e6;text-align:left">日期</th>';
  html += '<th style="padding:8px;border:1px solid #dee2e6;text-align:right">全局流入</th>';
  html += '<th style="padding:8px;border:1px solid #dee2e6;text-align:right">初检通过率</th>';
  supNames.forEach(function(s) {
    html += '<th style="padding:8px;border:1px solid #dee2e6;text-align:right;color:' + colors[s] + '">' + s + '流入</th>';
  });
  supNames.forEach(function(s) {
    html += '<th style="padding:8px;border:1px solid #dee2e6;text-align:right;color:' + colors[s] + '">' + s + '通过率</th>';
  });
  html += '</tr></thead><tbody>';

  data.dates.forEach(function(d, i) {
    html += '<tr>';
    html += '<td style="padding:6px 8px;border:1px solid #dee2e6">' + d + '</td>';
    html += '<td style="padding:6px 8px;border:1px solid #dee2e6;text-align:right">' + data.global_inflow[i] + '</td>';
    html += '<td style="padding:6px 8px;border:1px solid #dee2e6;text-align:right">' + data.global_inspect_rate[i] + '%</td>';
    supNames.forEach(function(s) {
      html += '<td style="padding:6px 8px;border:1px solid #dee2e6;text-align:right">' + data.sup_inflow[s][i] + '</td>';
    });
    supNames.forEach(function(s) {
      var rate = data.sup_inspect_rate[s][i];
      html += '<td style="padding:6px 8px;border:1px solid #dee2e6;text-align:right">' + (rate > 0 ? rate + '%' : '-') + '</td>';
    });
    html += '</tr>';
  });

  // 合计行
  html += '<tr style="font-weight:600;background:#f0f2f5">';
  html += '<td style="padding:8px;border:1px solid #dee2e6">合计</td>';
  html += '<td style="padding:8px;border:1px solid #dee2e6;text-align:right">' + data.global_inflow.reduce(function(a,b){return a+b;},0) + '</td>';
  var avgRate = data.global_inspect_total.reduce(function(a,b){return a+b;},0) > 0
    ? (data.global_inspect_pass.reduce(function(a,b){return a+b;},0) / data.global_inspect_total.reduce(function(a,b){return a+b;},0) * 100).toFixed(1)
    : 0;
  html += '<td style="padding:8px;border:1px solid #dee2e6;text-align:right">' + avgRate + '%</td>';
  supNames.forEach(function(s) {
    var total = data.sup_inflow[s].reduce(function(a,b){return a+b;},0);
    html += '<td style="padding:8px;border:1px solid #dee2e6;text-align:right;color:' + colors[s] + '">' + total + '</td>';
  });
  supNames.forEach(function(s) {
    html += '<td style="padding:8px;border:1px solid #dee2e6;text-align:right">-</td>';
  });
  html += '</tr>';
  html += '</tbody>';
  table.innerHTML = html;
}

// ========== 启动 ==========
chartGlobalInflow();
chartGlobalInspect();
chartSupInflow();
chartSupInspect();
renderTable();
</script>
</body>
</html>
